name: Feature Request
description: 提交一个功能请求
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你的需求。

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 这个功能解决什么问题？
      placeholder: 我在使用时遇到的问题是...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望如何解决这个问题
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其他替代方案
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 其他相关上下文、截图等
    validations:
      required: false
